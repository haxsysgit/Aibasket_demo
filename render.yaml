services:
  - type: web
    name: ai-basket-builder
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: NODE_VERSION
        value: "20"
